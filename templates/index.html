<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='styles/styles.css') }}"
    />
    <title>Speedtest Dashboard</title>
  </head>

  <body>
    <div class="dashboard">
      <header class="header">
        <h1>Speedtest Dashboard</h1>
        <nav class="filters">
          <button class="filter-btn" data-number="1" data-unit="hour">1h</button>
          <button class="filter-btn" data-number="6" data-unit="hour">6h</button>
          <button class="filter-btn" data-number="12" data-unit="hour">12h</button>
          <span class="filter-sep"></span>
          <button class="filter-btn" data-number="1" data-unit="day">1d</button>
          <button class="filter-btn" data-number="3" data-unit="day">3d</button>
          <button class="filter-btn" data-number="6" data-unit="day">6d</button>
          <span class="filter-sep"></span>
          <button class="filter-btn" data-number="1" data-unit="week">1w</button>
          <button class="filter-btn" data-number="2" data-unit="week">2w</button>
          <button class="filter-btn" data-number="4" data-unit="week">4w</button>
          <button class="filter-btn" data-number="16" data-unit="week">16w</button>
        </nav>
      </header>

      <section class="stats-row">
        <div class="stat-card fade-in">
          <div class="stat-label">Download</div>
          <div class="stat-value">
            {{ data['average']['download'] }}<span class="stat-unit">Mbps</span>
          </div>
        </div>
        <div class="stat-card fade-in">
          <div class="stat-label">Upload</div>
          <div class="stat-value">
            {{ data['average']['upload'] }}<span class="stat-unit">Mbps</span>
          </div>
        </div>
        <div class="stat-card fade-in">
          <div class="stat-label">Ping</div>
          <div class="stat-value">
            {{ data['average']['ping'] }}<span class="stat-unit">ms</span>
          </div>
        </div>
      </section>

      <section class="chart-card fade-in">
        {% if data['data'] %}
        <canvas id="speedChart"></canvas>
        {% else %}
        <div class="empty-state">No data available for the selected time range.</div>
        {% endif %}
      </section>
    </div>

    <script>
      window.speedtestData = JSON.parse({{ data_json | tojson }});
      window.activeFilter = { number: "{{ number }}", unit: "{{ unit }}" };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='scripts/script.js') }}"></script>
  </body>
</html>
